<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CI/CD Demo manual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #232F3E, #FF9900);
            color: white;
            text-align: center;
            padding-top: 100px;
            margin: 0;
        }

        .container {
            background: rgba(255,255,255,0.15);
            width: 60%;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        h2 {
            color: yellow;
        }

        p {
            font-size: 20px;
        }

        footer {
            margin-top: 30px;
            font-size: 16px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: white;
            color: #232F3E;
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
        }

        .btn:hover {
            background: yellow;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 AWS CI/CD Pipeline Demo</h1>

    <h2>Deployment Successful!</h2>

    <p>This website was automatically deployed using:</p>

    <p>
        GitHub → CodePipeline → CodeBuild → CodeDeploy → EC2
    </p>

    <p>
        <strong>Server:</strong> Amazon Linux EC2
    </p>

    <p>
        <strong>Status:</strong> ✅ Running Successfully
    </p>

    <a href="#" class="btn">Welcome to AWS</a>

    <footer>
        <hr>
        <p>Created by Sai | AWS DevOps Practice</p>
    </footer>
</div>

</html>
